<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#120e18"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="37" fill="url(#bgGrad)"/>
  <!-- Outer glow layer -->
  <text x="90" y="138" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="140"
    fill="none" stroke="rgba(255,106,26,0.15)" stroke-width="16"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#neonGlow)">J</text>
  <!-- Main tube -->
  <text x="90" y="138" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="140"
    fill="none" stroke="rgb(255,106,26)" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round">J</text>
  <!-- Inner core -->
  <text x="90" y="138" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="140"
    fill="none" stroke="rgba(255,235,210,0.85)" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round">J</text>
</svg>
